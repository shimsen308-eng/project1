<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단기북스</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />


    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/main.css">

</head>

<body>
    <header>
        <div id="header_top">
            <div class="container">
                <div id="login">
                    <ul>
                        <li><a href="#">로그인</a></li>
                        <li><a href="#">회원가입</a></li>
                        <li><a href="#">장바구니</a></li>
                        <li><a href="#">고객센터</a></li>
                        <li><a href="#">내 강의실</a></li>
                    </ul>
                </div>
            </div>
        </div>

        <div id="header_main">
            <div class="container">
                <div class="header_inner">
                    <div class="logo">
                        <img src="./img/header_logo_dangibooks.png" alt="로고">
                    </div>

                    <select class="dropdown-select">
                        <option>공단기</option>
                        <option>기술단기</option>
                        <option>소방단기</option>
                        <option>공기업단기</option>
                        <option>자단기</option>
                        <option>영단기</option>
                        <option>노무사단기</option>
                        <option>법무사단기</option>
                    </select>
                </div>
            </div>
        </div>

        <nav>
            <div class="container">
                <ul>
                    <li><a href="#">공단기 홈</a></li>
                    <li><a href="#">선생님</a></li>
                    <li><a href="#">수강신청</a></li>
                    <li><a href="#">수험정보</a></li>
                    <li><a href="#">이벤트</a></li>
                    <li><a href="#">교재</a></li>
                    <li><a href="#">풀서비스</a></li>
                    <li><a href="#">프리패스</a></li>
                    <li><a href="#">프리미엄 서비스</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <aside></aside>
        <div id="main_content">
            <div id="slider">

                <div id="slider_txt">
                    <div class="swiper-button-next"></div>
                    <div class="swiper-button-prev"></div>
                </div>
                <!-- Swiper -->
                <div class="swiper mySwiper">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide">Slide 1</div>
                        <div class="swiper-slide">Slide 2</div>
                        <div class="swiper-slide">Slide 3</div>
                    </div>
                </div>

            </div>
            <div id="search"></div>
            <div id="best"></div>
            <div id="banner"></div>
            <div id="new"></div>
        </div>
    </main>

    <footer>
        <div class="container">
              <div id="login">
                    <ul>
                        <li><a href="#">회사소개</a></li>
                        <li><a href="#">이용약관</a></li>
                        <li><a href="#">개인정보처리방침</a></li>
                        <li><a href="#">강사모집</a></li>
                    </ul>
                </div>
        </div>
    </footer>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <!-- Initialize Swiper -->
    <script>
        var swiper = new Swiper(".mySwiper", {
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },
        });
    </script>

</body>

</html>
